name: Publish Python bindings

on:
  workflow_call:

concurrency:
  group: publish-python

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  # The below settings are based on advice from:
  # https://corrode.dev/blog/tips-for-faster-ci-builds/
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_TEST_DEBUG: 0

jobs:
  tag:
    name: tag the version
    runs-on: ubuntu-latest
    needs:
      - should-publish
      - macos
      - windows
      - linux
      - musllinux
    if: needs.should-publish.outputs.is_new_version == 'yes' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: true
      - name: Tag the version
        run: |
          set -euxo pipefail
          CURRENT_VERSION="$(.github/workflows/get_current_crate_version.sh pytrustfall)"
          TAG_NAME="pytrustfall-v$CURRENT_VERSION"
          git tag -f "$TAG_NAME"
          git push --force origin "refs/tags/$TAG_NAME:refs/tags/$TAG_NAME"

  publish:
    name: publish python trustfall
    runs-on: ubuntu-latest
    needs:
      - should-publish
      - tag
      - macos
      - windows
      - linux
      - musllinux
    if: needs.should-publish.outputs.is_new_version == 'yes' && github.ref == 'refs/heads/main'
    permissions:
      # This permission is used for trusted publishing:
      # https://blog.pypi.org/posts/2023-04-20-introducing-trusted-publishers/
      #
      # Trusted publishing is configured on PyPI for the `trustfall` Python package.
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          print-hash: true
          # Attestations don't currently support reusable workflows
          # so publishing fails if this is enabled: https://github.com/pypi/warehouse/issues/11096
          attestations: false

  macos:
    # Build native Apple Silicon wheels on the current macOS hosted runner.
    runs-on: macos-15
    needs:
      - should-publish
    if: needs.should-publish.outputs.is_new_version == 'yes'
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15"]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: false
      - name: Install rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - name: Show python version
        run: |
          python --version
      - name: Build wheels - arm64
        uses: messense/maturin-action@v1
        with:
          # version pinned until https://github.com/PyO3/maturin/issues/2154 is fixed
          maturin-version: v1.6.0
          target: aarch64-apple-darwin
          args: --release --interpreter python --out dist --sdist -m pytrustfall/Cargo.toml
      - name: Install built wheel - arm64
        run: |
          pip install trustfall --no-index --find-links dist --force-reinstall
          python -c "import trustfall"
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    needs:
      - should-publish
    if: needs.should-publish.outputs.is_new_version == 'yes'
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15"]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: false
      - name: Install rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - name: Show python version
        run: |
          python --version
      - name: Build wheels
        uses: messense/maturin-action@v1
        with:
          target: x64
          args: --release --interpreter python --out dist -m pytrustfall/Cargo.toml
      - name: Install built wheel
        run: |
          pip install trustfall --no-index --find-links dist --force-reinstall
          python -c "import trustfall"
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  linux:
    runs-on: ubuntu-latest
    needs:
      - should-publish
    if: needs.should-publish.outputs.is_new_version == 'yes'
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15"]
    env:
      PY_VERSION: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: false
      - name: Install rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - name: Show python version
        run: |
          uv run --python "$PY_VERSION" python --version
      - name: Build wheels
        uses: messense/maturin-action@v1
        with:
          target: x86_64
          manylinux: auto
          args: --release --interpreter python${{ matrix.python-version}} --out dist -m pytrustfall/Cargo.toml
      - name: Install built wheel
        run: |
          uv venv --seed --python "$PY_VERSION" .venv
          . .venv/bin/activate
          python -m pip install trustfall --no-index --find-links dist --force-reinstall
          python -c "import trustfall"
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  musllinux:
    runs-on: ubuntu-latest
    needs:
      - should-publish
    if: needs.should-publish.outputs.is_new_version == 'yes'
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15"]
    env:
      PY_VERSION: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Build wheels
        # Unlike the regular Linux job, musllinux builds run inside maturin-action's Docker
        # container, so host Python setup (e.g. setup-uv) is not used for wheel building.
        # maturin-action forwards `--interpreter` to `maturin` and does not install Python:
        # `pythonX.Y` must already exist in that container's PATH.
        uses: messense/maturin-action@v1
        with:
          target: x86_64-unknown-linux-musl
          manylinux: musllinux_1_2
          args: --release --interpreter python${{ matrix.python-version}} --out dist -m pytrustfall/Cargo.toml
      - name: Install built wheel
        shell: bash
        run: |
          set -euxo pipefail
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/io" \
            -w /io \
            -e PY_VERSION \
            quay.io/pypa/musllinux_1_2_x86_64 \
            sh -euxc '
              ls -alh /io/dist/
              # Install the exact matrix interpreter in the musllinux container and validate
              # the built wheel with it. This avoids depending on preinstalled /opt/python
              # layouts, which can differ by image and Python version.
              curl -LsSf https://astral.sh/uv/install.sh | sh
              export PATH="$HOME/.local/bin:$PATH"
              uv venv --seed --python "${PY_VERSION}" /tmp/wheel-check-venv
              /tmp/wheel-check-venv/bin/python --version
              /tmp/wheel-check-venv/bin/python -m pip install trustfall --no-index --find-links /io/dist/ --force-reinstall
              /tmp/wheel-check-venv/bin/python -c "import trustfall"
            '
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-musllinux-${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  should-publish:
    name: Did version change
    runs-on: ubuntu-latest
    outputs:
      is_new_version: "${{ steps.check.outputs.is_new_version }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - id: check
        run: |
          set +e
          .github/workflows/is_py_package_version_already_uploaded.sh pytrustfall trustfall
          export EXIT_CODE="$?"
          set -e
          if [[ "$EXIT_CODE" == "7" ]]; then
            echo 'is_new_version=no' >> "$GITHUB_OUTPUT"
          elif [[ "$EXIT_CODE" == "0" ]]; then
            echo 'is_new_version=yes' >> "$GITHUB_OUTPUT"
          else
            # Unexpected outcome, indicates a bug.
            exit "$EXIT_CODE"
          fi

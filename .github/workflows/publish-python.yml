name: Publish Python bindings

on:
  workflow_call:

concurrency:
  group: publish-python

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  # The below settings are based on advice from:
  # https://corrode.dev/blog/tips-for-faster-ci-builds/
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_TEST_DEBUG: 0

jobs:
  tag:
    name: tag the version
    runs-on: ubuntu-latest
    needs:
      - should-publish
      - macos
      - windows
      - linux
      - musllinux
    if: needs.should-publish.outputs.is_new_version == 'yes' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: true
      - name: Tag the version
        run: |
          set -euxo pipefail
          CURRENT_VERSION="$(.github/workflows/get_current_crate_version.sh pytrustfall)"
          TAG_NAME="pytrustfall-v$CURRENT_VERSION"
          git tag -f "$TAG_NAME"
          git push --force origin "refs/tags/$TAG_NAME:refs/tags/$TAG_NAME"

  publish:
    name: publish python trustfall
    runs-on: ubuntu-latest
    needs:
      - should-publish
      - tag
      - macos
      - windows
      - linux
      - musllinux
    if: needs.should-publish.outputs.is_new_version == 'yes' && github.ref == 'refs/heads/main'
    permissions:
      # This permission is used for trusted publishing:
      # https://blog.pypi.org/posts/2023-04-20-introducing-trusted-publishers/
      #
      # Trusted publishing is configured on PyPI for the `trustfall` Python package.
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: artifacts
      - name: Collect wheel artifacts safely
        run: |
          set -euxo pipefail
          mapfile -t wheel_paths < <(find artifacts -type f -name '*.whl' | sort)

          if [[ "${#wheel_paths[@]}" -eq 0 ]]; then
            echo "No wheel files were downloaded from artifacts."
            exit 1
          fi

          mapfile -t duplicate_basenames < <(printf '%s\n' "${wheel_paths[@]##*/}" | sort | uniq -d)
          if [[ "${#duplicate_basenames[@]}" -ne 0 ]]; then
            echo "Duplicate wheel filenames found across artifacts:"
            printf '%s\n' "${duplicate_basenames[@]}"
            echo
            for base in "${duplicate_basenames[@]}"; do
              echo "Conflicting files for: $base"
              find artifacts -type f -name "$base" | sort
            done
            exit 1
          fi

          mkdir -p dist
          cp "${wheel_paths[@]}" dist/
          ls -alh dist/
      - name: Basic distribution consistency test
        run: |
          set -euxo pipefail
          shopt -s nullglob

          wheels=(dist/*.whl)
          if [[ "${#wheels[@]}" -eq 0 ]]; then
            echo "No wheel files found in dist/."
            exit 1
          fi

          tags_file="$(mktemp)"
          for wheel in "${wheels[@]}"; do
            wheel_name="$(basename "$wheel")"
            base_name="${wheel_name%.whl}"
            IFS='-' read -r -a parts <<< "$base_name"

            if [[ "${#parts[@]}" -lt 5 ]]; then
              echo "Invalid wheel filename: $wheel_name"
              exit 1
            fi

            tag_start=$(( ${#parts[@]} - 3 ))
            py_tag="${parts[$tag_start]}"
            abi_tag="${parts[$(( tag_start + 1 ))]}"
            platform_tag="${parts[$(( tag_start + 2 ))]}"

            if [[ "$py_tag" != cp* ]]; then
              echo "Unexpected python tag '$py_tag' in $wheel_name"
              exit 1
            fi

            echo "$py_tag/$abi_tag/$platform_tag" >> "$tags_file"
            unzip -t "$wheel" >/dev/null
          done

          if [[ -n "$(sort "$tags_file" | uniq -d)" ]]; then
            echo "Duplicate wheel compatibility tags detected:"
            sort "$tags_file" | uniq -d
            exit 1
          fi

          rm -f "$tags_file"
          ls -alh dist/
      - name: Twine metadata check
        run: |
          set -euxo pipefail
          python3 -m pip install --disable-pip-version-check twine
          python3 -m twine check dist/*
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          print-hash: true
          # Attestations don't currently support reusable workflows
          # so publishing fails if this is enabled: https://github.com/pypi/warehouse/issues/11096
          attestations: false

  macos:
    # Build native Apple Silicon wheels on the current macOS hosted runner.
    runs-on: macos-15
    needs:
      - should-publish
    if: needs.should-publish.outputs.is_new_version == 'yes'
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15"]
    env:
      PY_VERSION: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: false
      - name: Install rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      # This job builds on the host runner, so maturin needs a concrete interpreter path.
      # We create a matrix-version uv venv and pass its python executable explicitly.
      # (Linux/musllinux jobs run in maturin containers where `pythonX.Y` is resolved there;
      # host paths from this runner would not exist inside those containers.)
      - name: Prepare Python interpreter
        id: prepare-python
        run: |
          set -euxo pipefail
          uv python install "$PY_VERSION"
          uv venv --seed --python "$PY_VERSION" .venv
          PYTHON_BIN="$PWD/.venv/bin/python"
          "$PYTHON_BIN" --version
          echo "PYTHON_BIN=$PYTHON_BIN" >> "$GITHUB_ENV"
          echo "python_bin=$PYTHON_BIN" >> "$GITHUB_OUTPUT"
      - name: Build wheels - arm64
        uses: messense/maturin-action@v1
        with:
          target: aarch64-apple-darwin
          args: --release --interpreter ${{ steps.prepare-python.outputs.python_bin }} --out dist --sdist -m pytrustfall/Cargo.toml
      - name: Validate built wheel tag
        run: |
          set -euxo pipefail
          EXPECTED_CP_TAG="cp${PY_VERSION//./}"
          shopt -s nullglob
          wheels=(dist/*.whl)
          if [[ "${#wheels[@]}" -ne 1 ]]; then
            echo "Expected exactly one wheel in dist/, found ${#wheels[@]}."
            ls -alh dist/
            exit 1
          fi

          wheel_name="$(basename "${wheels[0]}")"
          if [[ "$wheel_name" != *"-${EXPECTED_CP_TAG}-"* ]]; then
            echo "Wheel tag mismatch: expected '$EXPECTED_CP_TAG' in '$wheel_name'."
            exit 1
          fi
      - name: Install built wheel - arm64
        run: |
          "$PYTHON_BIN" -m pip install trustfall --no-index --find-links dist --force-reinstall
          "$PYTHON_BIN" -c "import trustfall"
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    needs:
      - should-publish
    if: needs.should-publish.outputs.is_new_version == 'yes'
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15"]
    env:
      PY_VERSION: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: false
      - name: Install rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      # This job builds on the host runner, so maturin needs a concrete interpreter path.
      # We create a matrix-version uv venv and pass its python executable explicitly.
      # (Linux/musllinux jobs run in maturin containers where `pythonX.Y` is resolved there;
      # host paths from this runner would not exist inside those containers.)
      - name: Prepare Python interpreter
        id: prepare-python
        shell: pwsh
        run: |
          uv python install "$env:PY_VERSION"
          uv venv --seed --python "$env:PY_VERSION" .venv
          $python_bin = (Resolve-Path .\.venv\Scripts\python.exe).Path
          & $python_bin --version
          Add-Content -Path $env:GITHUB_ENV -Value "PYTHON_BIN=$python_bin"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "python_bin=$python_bin"
      - name: Build wheels
        uses: messense/maturin-action@v1
        with:
          target: x64
          args: --release --interpreter ${{ steps.prepare-python.outputs.python_bin }} --out dist -m pytrustfall/Cargo.toml
      - name: Validate built wheel tag
        shell: pwsh
        run: |
          $expectedCpTag = "cp$($env:PY_VERSION -replace '\.', '')"
          $wheels = Get-ChildItem -Path dist -Filter *.whl -File
          if ($wheels.Count -ne 1) {
            Write-Error "Expected exactly one wheel in dist/, found $($wheels.Count)."
            Get-ChildItem dist
            exit 1
          }

          $wheelName = $wheels[0].Name
          if ($wheelName -notmatch "-$expectedCpTag-") {
            Write-Error "Wheel tag mismatch: expected '$expectedCpTag' in '$wheelName'."
            exit 1
          }
      - name: Install built wheel
        shell: pwsh
        run: |
          & $env:PYTHON_BIN -m pip install trustfall --no-index --find-links dist --force-reinstall
          & $env:PYTHON_BIN -c "import trustfall"
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  linux:
    runs-on: ubuntu-latest
    needs:
      - should-publish
    if: needs.should-publish.outputs.is_new_version == 'yes'
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15"]
    env:
      PY_VERSION: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: false
      - name: Install rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - name: Show python version
        run: |
          uv run --python "$PY_VERSION" python --version
      - name: Build wheels
        uses: messense/maturin-action@v1
        with:
          target: x86_64
          manylinux: auto
          args: --release --interpreter python${{ matrix.python-version}} --out dist -m pytrustfall/Cargo.toml
      - name: Validate built wheel tag
        run: |
          set -euxo pipefail
          EXPECTED_CP_TAG="cp${PY_VERSION//./}"
          shopt -s nullglob
          wheels=(dist/*.whl)
          if [[ "${#wheels[@]}" -ne 1 ]]; then
            echo "Expected exactly one wheel in dist/, found ${#wheels[@]}."
            ls -alh dist/
            exit 1
          fi

          wheel_name="$(basename "${wheels[0]}")"
          if [[ "$wheel_name" != *"-${EXPECTED_CP_TAG}-"* ]]; then
            echo "Wheel tag mismatch: expected '$EXPECTED_CP_TAG' in '$wheel_name'."
            exit 1
          fi
      - name: Install built wheel
        run: |
          uv venv --seed --python "$PY_VERSION" .venv
          . .venv/bin/activate
          python -m pip install trustfall --no-index --find-links dist --force-reinstall
          python -c "import trustfall"
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  musllinux:
    runs-on: ubuntu-latest
    needs:
      - should-publish
    if: needs.should-publish.outputs.is_new_version == 'yes'
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15"]
    env:
      PY_VERSION: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Build wheels
        # Unlike the regular Linux job, musllinux builds run inside maturin-action's Docker
        # container, so host Python setup (e.g. setup-uv) is not used for wheel building.
        # maturin-action forwards `--interpreter` to `maturin` and does not install Python:
        # `pythonX.Y` must already exist in that container's PATH.
        uses: messense/maturin-action@v1
        with:
          target: x86_64-unknown-linux-musl
          manylinux: musllinux_1_2
          args: --release --interpreter python${{ matrix.python-version}} --out dist -m pytrustfall/Cargo.toml
      - name: Validate built wheel tag
        run: |
          set -euxo pipefail
          EXPECTED_CP_TAG="cp${PY_VERSION//./}"
          shopt -s nullglob
          wheels=(dist/*.whl)
          if [[ "${#wheels[@]}" -ne 1 ]]; then
            echo "Expected exactly one wheel in dist/, found ${#wheels[@]}."
            ls -alh dist/
            exit 1
          fi

          wheel_name="$(basename "${wheels[0]}")"
          if [[ "$wheel_name" != *"-${EXPECTED_CP_TAG}-"* ]]; then
            echo "Wheel tag mismatch: expected '$EXPECTED_CP_TAG' in '$wheel_name'."
            exit 1
          fi
      - name: Install built wheel
        shell: bash
        run: |
          set -euxo pipefail
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/io" \
            -w /io \
            -e PY_VERSION \
            quay.io/pypa/musllinux_1_2_x86_64 \
            sh -euxc '
              ls -alh /io/dist/
              # Install the exact matrix interpreter in the musllinux container and validate
              # the built wheel with it. This avoids depending on preinstalled /opt/python
              # layouts, which can differ by image and Python version.
              curl -LsSf https://astral.sh/uv/install.sh | sh
              export PATH="$HOME/.local/bin:$PATH"
              uv venv --seed --python "${PY_VERSION}" /tmp/wheel-check-venv
              /tmp/wheel-check-venv/bin/python --version
              /tmp/wheel-check-venv/bin/python -m pip install trustfall --no-index --find-links /io/dist/ --force-reinstall
              /tmp/wheel-check-venv/bin/python -c "import trustfall"
            '
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-musllinux-${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  should-publish:
    name: Did version change
    runs-on: ubuntu-latest
    outputs:
      is_new_version: "${{ steps.check.outputs.is_new_version }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - id: check
        run: |
          set +e
          .github/workflows/is_py_package_version_already_uploaded.sh pytrustfall trustfall
          export EXIT_CODE="$?"
          set -e
          if [[ "$EXIT_CODE" == "7" ]]; then
            echo 'is_new_version=no' >> "$GITHUB_OUTPUT"
          elif [[ "$EXIT_CODE" == "0" ]]; then
            echo 'is_new_version=yes' >> "$GITHUB_OUTPUT"
          else
            # Unexpected outcome, indicates a bug.
            exit "$EXIT_CODE"
          fi
